# Site
title: "Mobile Robot Kinematics Journey"
tagline: "From Differential to Swerve — 5 phases, one MPO-700, one month"
description: >-
  A self-study journey through 5 types of wheeled mobile robot kinematics
  with ROS2 Humble + Gazebo Classic 11 + Neobotix simulations.
  Code, debugging notes, and analysis included.

# URL
baseurl: "/mobile-robot-kinematics-journey"  # GitHub Pages serves the repo at this path
url: "https://sky-spectrum.github.io"

# Author
author:
  name: sky-spectrum
  github: sky-spectrum

# Theme
theme: minima
minima:
  date_format: "%Y-%m-%d"
  skin: dark
  social_links:
    github: sky-spectrum

# Plugins (GitHub Pages whitelist)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Default permalink for posts
permalink: /:year/:month/:day/:title/

# Exclude from processing
exclude:
  - vendor/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - .gitignore

# SEO
lang: en-US
locale: en-US
